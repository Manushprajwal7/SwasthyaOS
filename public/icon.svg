<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0F766E; }
      .foreground { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #14B8A6; }
      .foreground { fill: #0F172A; }
    }
  </style>
  <g clip-path="url(#clip0)">
    <rect class="background" width="180" height="180" rx="37" />
    
    <!-- Stethoscope Design -->
    <g transform="translate(90, 90)">
      <!-- Left earpiece tube -->
      <path class="foreground" 
        d="M -35 -50 Q -40 -45, -42 -35 L -42 -10 Q -42 0, -35 5" 
        stroke-width="6" 
        stroke-linecap="round" 
        fill="none" 
        stroke="currentColor"/>
      
      <!-- Right earpiece tube -->
      <path class="foreground" 
        d="M 35 -50 Q 40 -45, 42 -35 L 42 -10 Q 42 0, 35 5" 
        stroke-width="6" 
        stroke-linecap="round" 
        fill="none" 
        stroke="currentColor"/>
      
      <!-- Left earpiece tip -->
      <ellipse class="foreground" cx="-35" cy="-52" rx="5" ry="7"/>
      
      <!-- Right earpiece tip -->
      <ellipse class="foreground" cx="35" cy="-52" rx="5" ry="7"/>
      
      <!-- Center connection -->
      <path class="foreground" 
        d="M -35 5 Q -20 10, 0 10 Q 20 10, 35 5" 
        stroke-width="6" 
        stroke-linecap="round" 
        fill="none" 
        stroke="currentColor"/>
      
      <!-- Main tube -->
      <path class="foreground" 
        d="M 0 10 L 0 35 Q 0 45, -10 50 L -15 52" 
        stroke-width="6" 
        stroke-linecap="round" 
        fill="none" 
        stroke="currentColor"/>
      
      <!-- Chest piece (diaphragm) -->
      <circle class="foreground" cx="-15" cy="55" r="12" stroke-width="3" fill="none" stroke="currentColor"/>
      <circle class="foreground" cx="-15" cy="55" r="8" stroke-width="2" fill="none" stroke="currentColor"/>
      
      <!-- Small detail circle in center -->
      <circle class="foreground" cx="-15" cy="55" r="3"/>
    </g>
  </g>
  <defs>
    <clipPath id="clip0">
      <rect width="180" height="180" rx="37" fill="white" />
    </clipPath>
  </defs>
</svg>
